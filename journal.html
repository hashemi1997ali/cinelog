<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineLog — Journal</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./tailwind.config.js"></script>

    <style type="text/tailwindcss">
      @layer base {
        html {
          scroll-behavior: smooth;
        }
        body {
          @apply flex flex-col min-h-screen font-body bg-bg-base text-text-body antialiased;
        }

        body::before {
          content: "";
          position: fixed;
          inset: 0;
          background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
          pointer-events: none;
          z-index: 999;
          opacity: 0.4;
        }

        ::-webkit-scrollbar {
          width: 5px;
        }
        ::-webkit-scrollbar-track {
          @apply bg-bg-base;
        }
        ::-webkit-scrollbar-thumb {
          @apply bg-bg-border rounded-full;
        }
      }

      @layer components {
        /* Layout */
        .container {
          @apply max-w-7xl mx-auto px-5 md:px-10;
        }
        .btn {
          @apply inline-flex items-center justify-center gap-2
                 font-semibold rounded-xl px-5 py-2.5 text-sm
                 transition-all duration-200 cursor-pointer
                 active:scale-95 select-none;
        }
        .btn-gold {
          @apply btn bg-accent text-cinema-900
                 hover:bg-accent-dark hover:shadow-gold;
        }
        .btn-danger {
          @apply btn border border-red-500/30 text-red-400
                 hover:bg-red-500/10 hover:border-red-500;
        }

        /*  Section heading  */
        .section-title {
          @apply font-headings text-4xl md:text-5xl text-text-primary tracking-wide;
        }
        .section-label {
          @apply text-accent text-xs font-semibold uppercase tracking-[0.2em] mb-2;
        }

        /*  Rating badge  */
        .rating-badge {
          @apply inline-flex items-center gap-1
                 text-xs font-bold px-2 py-1 rounded-lg;
        }
        .rating-high {
          @apply rating-badge bg-green-500/20 text-green-400;
        }
        .rating-mid {
          @apply rating-badge bg-gold-500/20 text-gold-400;
        }
        .rating-low {
          @apply rating-badge bg-red-500/20 text-red-400;
        }

        /* Journal card  */
        .journal-card {
          @apply flex flex-col sm:flex-row gap-5
                 bg-bg-card rounded-2xl overflow-hidden
                 border border-bg-border/50
                 transition-all duration-300
                 hover:border-accent/30 hover:shadow-card;
        }
        .journal-poster {
          @apply w-full sm:w-36 shrink-0 aspect-[2/3] sm:aspect-auto
                 object-cover;
        }

        /* Notes textarea */
        .note-textarea {
          @apply w-full bg-bg-textarea rounded-xl px-4 py-3 text-sm
                 text-text-primary placeholder-muted
                 border border-bg-border
                 focus:outline-none focus:border-accent
                 resize-none transition-colors duration-200;
        }
      }
    </style>
  </head>

  <body>
    <header
      class="sticky top-0 z-40 bg-bg-base/80 backdrop-blur-md border-b border-bg-border/50 uppercase h-32 flex items-center justify-center"
    >
      header
    </header>

    <main class="flex-1">
      <!-- JOURNAL HERO -->
      <section class="py-14 border-b border-bg-border/50">
        <div
          class="container flex flex-col md:flex-row md:items-end justify-between gap-6"
        >
          <div class="animate-fade-up">
            <p class="section-label">Personal collection</p>
            <h1
              class="font-headings text-6xl md:text-7xl text-text-primary tracking-wide leading-none mb-3"
            >
              My <span class="text-accent">Journal</span>
            </h1>
            <p class="text-text-body max-w-md">
              Your saved films and personal notes — all in one place.
            </p>
          </div>

          <div id="journal-stats" class="flex gap-6 animate-fade-up">
            <div class="text-center">
              <p
                id="stat-count"
                class="font-headings text-4xl text-accent mb-0.5"
              >
                0
              </p>
              <p class="text-muted text-xs">Films saved</p>
            </div>
            <div class="text-center">
              <p
                id="stat-notes"
                class="font-headings text-4xl text-text-primary mb-0.5"
              >
                0
              </p>
              <p class="text-muted text-xs">With notes</p>
            </div>
          </div>
        </div>
      </section>
      <!-- END JOURNAL HERO -->

      <!-- JOURNAL ENTRIES LIST -->
      <section class="py-12">
        <div class="container">
          <!-- Empty state -->
          <div id="journal-empty" class="hidden text-center py-24">
            <i
              class="fa-solid fa-bookmark text-5xl text-bg-border mb-5 block"
            ></i>
            <h2
              class="font-headings text-4xl text-text-primary tracking-wide mb-2"
            >
              Nothing saved yet
            </h2>
            <p class="text-text-body mb-6 max-w-sm mx-auto">
              Go to Discover and add films to your journal using the
              <i class="fa-solid fa-bookmark text-accent mx-1"></i> button.
            </p>
            <a href="index.html" class="btn-gold text-base px-7 py-3">
              <i class="fa-solid fa-film"></i>
              Browse Movies
            </a>
          </div>

          <!-- Journal entries -->
          <div id="journal-list" class="flex flex-col gap-5"></div>
        </div>
      </section>
      <!-- END JOURNAL ENTRIES LIST -->
    </main>

    <footer
      class="border-t border-bg-border/50 py-8 mt-10 h-32 flex items-center justify-center uppercase"
    >
      footer
    </footer>

    <script src="./journal.js"></script>
  </body>
</html>
